name: بناء تطبيق أندرويد (APK)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: تنزيل الكود
        uses: actions/checkout@v4

      - name: التحقق من هيكل المجلدات وإصلاحه تلقائياً إن لزم
        run: |
          echo "محتويات جذر المستودع:"
          ls -la

          if [ -d "www" ] && [ -f "package.json" ]; then
            echo "✅ الهيكل صحيح: www/ و package.json موجودان في الجذر."
          else
            echo "⚠️ www/ غير موجود في الجذر. محاولة الإصلاح التلقائي..."

            FOUND_DIR=$(find . -maxdepth 3 -type d -name www -not -path "*/node_modules/*" | head -n 1)
            if [ -n "$FOUND_DIR" ]; then
              PARENT_DIR=$(dirname "$FOUND_DIR")
              echo "✅ تم العثور على www داخل: $PARENT_DIR — نقل محتوياته إلى الجذر."
              shopt -s dotglob
              mv "$PARENT_DIR"/* ./ 2>/dev/null || true
              shopt -u dotglob
            fi

            if [ ! -d "www" ] && [ -f "index.html" ] && [ -f "main.js" ]; then
              echo "🔧 اكتشاف رفع مسطّح لكل الملفات في الجذر — إعادة التنظيم تلقائياً."
              mkdir -p www/modules www/icons

              for f in index.html main.js style.css manifest.json service-worker.js firebase-config.js; do
                [ -f "$f" ] && mv "$f" www/ && echo "  → نقل $f إلى www/"
              done

              for f in accountsEngine.js dashboard.js expenses.js exportUtils.js reports.js; do
                [ -f "$f" ] && mv "$f" www/modules/ && echo "  → نقل $f إلى www/modules/"
              done

              for f in icon-192.png icon-512.png icon-512-maskable.png apple-touch-icon.png; do
                [ -f "$f" ] && mv "$f" www/icons/ && echo "  → نقل $f إلى www/icons/"
              done
            fi

            if [ ! -d "www" ] || [ ! -f "package.json" ]; then
              echo "❌ تعذر إعادة التنظيم تلقائياً."
              exit 1
            fi
          fi

          echo "محتويات الجذر بعد التحقق:"
          ls -la
          echo "محتويات www:"
          ls -la www || true
          echo "محتويات www/modules:"
          ls -la www/modules || true
          echo "محتويات www/icons:"
          ls -la www/icons || true

      - name: تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: تجهيز Android SDK
        uses: android-actions/setup-android@v3

      - name: تثبيت حزم Capacitor
        run: npm install

      - name: إضافة منصة أندرويد
        run: npx cap add android

      - name: مزامنة ملفات الويب مع مشروع أندرويد
        run: npx cap sync android

      - name: منح صلاحية التنفيذ لسكربت gradlew
        run: chmod +x android/gradlew

      - name: بناء ملف APK (نسخة تجريبية Debug)
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: رفع ملف APK كمخرج (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: abu-mohammed-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
